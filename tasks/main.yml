---
- name: Ensure ntfy-alertmanager group exists
  ansible.builtin.group:
    name: "{{ ntfy_alertmanager_group }}"
    state: present
    system: true
  become: true

- name: Ensure ntfy-alertmanager user exists
  ansible.builtin.user:
    name: "{{ ntfy_alertmanager_user }}"
    group: "{{ ntfy_alertmanager_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  become: true

- name: Install ntfy-alertmanager binary
  ansible.builtin.copy:
    src: build/ntfy-alertmanager
    dest: /usr/local/bin/
    mode: 0755
  become: true
  notify: restart ntfy-alertmanager

- name: Ensure configuration directory for ntfy-alertmanager
  ansible.builtin.file:
    path: /etc/ntfy-alertmanager
    state: directory
    owner: "{{ ntfy_alertmanager_user }}"
    group: "{{ ntfy_alertmanager_group }}"
    mode: 0755
  become: true

- name: Configure ntfy-alertmanager
  ansible.builtin.template:
    src: config.j2
    dest: /etc/ntfy-alertmanager/config
    owner: "{{ ntfy_alertmanager_user }}"
    group: "{{ ntfy_alertmanager_group }}"
    mode: 0640
  become: true
  notify: restart ntfy-alertmanager

- name: Copy systemd service file for ntfy-alertmanager
  ansible.builtin.template:
    src: ntfy-alertmanager.service.j2
    dest: /etc/systemd/system/ntfy-alertmanager.service
  become: true
  notify: restart ntfy-alertmanager

- name: Ensure ntfy-alertmanager service is enabled
  ansible.builtin.service:
    name: ntfy-alertmanager
    enabled: true
    state: started
  become: true
